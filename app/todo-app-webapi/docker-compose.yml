services:
  postgres:
    image: postgres:16-alpine
    container_name: todo-app-webapi-postgres
    environment:
      POSTGRES_DB: todoapp
      POSTGRES_USER: todoapp
      POSTGRES_PASSWORD: todoapp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todoapp -d todoapp"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - todo_app_webapi_postgres_data:/var/lib/postgresql/data

volumes:
  todo_app_webapi_postgres_data:
